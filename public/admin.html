<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - AutoReply Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .user-card { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .user-card:hover { border-color: var(--primary-light); }
    .user-left { display: flex; align-items: center; gap: 14px; }
    .user-avatar-lg { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; }
    .user-name { font-weight: 700; font-size: 0.95rem; }
    .user-email { color: var(--gray); font-size: 0.82rem; }
    .user-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .plan-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
    .plan-free { background: #f1f5f9; color: #64748b; }
    .plan-starter { background: #eff6ff; color: #2563eb; }
    .plan-pro { background: #f5f3ff; color: #7c3aed; }
    .plan-enterprise { background: #fef3c7; color: #d97706; }
    .status-active { color: #10b981; }
    .status-inactive { color: #ef4444; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .modal .form-group { margin-bottom: 14px; }
    .modal .form-group label { font-size: 0.85rem; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
      <span class="brand-text">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="overview">
        <i class="fas fa-chart-pie"></i><span>Overview</span>
      </a>
      <a href="#" class="nav-item" data-section="users">
        <i class="fas fa-users"></i><span>All Users</span>
      </a>
      <a href="/dashboard" class="nav-item">
        <i class="fas fa-arrow-left"></i><span>Back to Dashboard</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-title"><h1 id="pageTitle">Admin Overview</h1></div>
      <div class="topbar-actions"><span class="live-badge" style="background:#fef3c7;color:#d97706;"><i class="fas fa-shield-halved"></i> Admin</span></div>
    </header>

    <main class="content">
      <!-- Overview -->
      <section id="section-overview" class="section active">
        <div class="stats-grid">
          <div class="stat-card stat-blue">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-info"><span class="stat-number" id="statTotalUsers">0</span><span class="stat-label">Total Users</span></div>
          </div>
          <div class="stat-card stat-green">
            <div class="stat-icon"><i class="fas fa-user-check"></i></div>
            <div class="stat-info"><span class="stat-number" id="statActiveUsers">0</span><span class="stat-label">Active Users</span></div>
          </div>
          <div class="stat-card stat-purple">
            <div class="stat-icon"><i class="fas fa-list"></i></div>
            <div class="stat-info"><span class="stat-number" id="statTotalRules">0</span><span class="stat-label">Total Rules</span></div>
          </div>
          <div class="stat-card stat-whatsapp">
            <div class="stat-icon"><i class="fas fa-crown"></i></div>
            <div class="stat-info"><span class="stat-number" id="statProUsers">0</span><span class="stat-label">Pro Users</span></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><h2><i class="fas fa-chart-bar"></i> Subscription Breakdown</h2></div>
          <div style="padding: 24px;">
            <div class="rule-item" style="border: none; padding: 10px 0;">
              <span>🆓 Free Plan</span><strong id="statFreeUsers">0</strong>
            </div>
            <div class="rule-item" style="border: none; padding: 10px 0;">
              <span>🔵 Pro Plan</span><strong id="statProUsers2">0</strong>
            </div>
            <div class="rule-item" style="border: none; padding: 10px 0;">
              <span>🟣 Enterprise Plan</span><strong id="statEnterpriseUsers">0</strong>
            </div>
          </div>
        </div>
      </section>

      <!-- Users -->
      <section id="section-users" class="section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-users"></i> All Users</h2></div>
          <div id="usersContainer" style="padding: 16px 24px;">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Edit User Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2><i class="fas fa-user-edit"></i> Edit User</h2>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="editName">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="editEmail">
      </div>
      <div class="form-group">
        <label>Subscription Plan</label>
        <select id="editPlan">
          <option value="free">Free (5 rules)</option>
          <option value="starter">Starter (25 rules)</option>
          <option value="pro">Pro (100 rules)</option>
          <option value="enterprise">Enterprise (Unlimited)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Max Rules</label>
        <input type="number" id="editMaxRules" value="5">
      </div>
      <div class="form-group">
        <label>Account Status</label>
        <select id="editStatus">
          <option value="true">Active</option>
          <option value="false">Suspended</option>
        </select>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="editRole">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveUserEdit()"><i class="fas fa-save"></i> Save</button>
        <button class="btn" style="background:#e2e8f0;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!token) window.location.href = '/login';

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    let editingUserId = null;

    document.addEventListener('DOMContentLoaded', () => {
      fetchStats();
      fetchUsers();
      setupNav();
    });

    function setupNav() {
      document.querySelectorAll('.nav-item[data-section]').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          const section = item.dataset.section;
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          item.classList.add('active');
          document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
          document.getElementById(`section-${section}`).classList.add('active');
          document.getElementById('pageTitle').textContent = section === 'overview' ? 'Admin Overview' : 'All Users';
        });
      });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.clear(); window.location.href = '/login'; }

    async function fetchStats() {
      try {
        const res = await fetch('/api/admin/stats', { headers: authHeaders() });
        const data = await res.json();
        if (data.success) {
          document.getElementById('statTotalUsers').textContent = data.data.totalUsers;
          document.getElementById('statActiveUsers').textContent = data.data.activeUsers;
          document.getElementById('statTotalRules').textContent = data.data.totalRules;
          document.getElementById('statProUsers').textContent = data.data.proUsers + data.data.enterpriseUsers;
          document.getElementById('statFreeUsers').textContent = data.data.freeUsers;
          document.getElementById('statProUsers2').textContent = data.data.proUsers;
          document.getElementById('statEnterpriseUsers').textContent = data.data.enterpriseUsers;
        }
      } catch (e) { console.error(e); }
    }

    async function fetchUsers() {
      try {
        const res = await fetch('/api/admin/users', { headers: authHeaders() });
        const data = await res.json();
        if (data.success) renderUsers(data.data);
        else document.getElementById('usersContainer').innerHTML = '<p>Access denied. Admin only.</p>';
      } catch (e) {
        document.getElementById('usersContainer').innerHTML = '<p>Error loading users.</p>';
      }
    }

    function renderUsers(users) {
      if (users.length === 0) {
        document.getElementById('usersContainer').innerHTML = '<p>No users yet.</p>';
        return;
      }
      document.getElementById('usersContainer').innerHTML = users.map(u => `
        <div class="user-card">
          <div class="user-left">
            <div class="user-avatar-lg">${u.name.charAt(0).toUpperCase()}</div>
            <div>
              <div class="user-name">${u.name} ${u.role === 'admin' ? '<i class="fas fa-shield-halved" style="color:#d97706;font-size:0.8rem;"></i>' : ''}</div>
              <div class="user-email">${u.email}</div>
              <div style="font-size:0.78rem;color:#94a3b8;">Rules: ${u.ruleCount || 0} | Page: ${u.pageDetails?.pageName || 'Not connected'}</div>
            </div>
          </div>
          <div class="user-right">
            <span class="plan-badge plan-${u.subscription?.plan || 'free'}">${u.subscription?.plan || 'free'}</span>
            <span class="${u.isActive ? 'status-active' : 'status-inactive'}"><i class="fas fa-circle" style="font-size:0.5rem;"></i> ${u.isActive ? 'Active' : 'Suspended'}</span>
            <button class="btn btn-edit" onclick="openEditModal('${u._id}', '${u.name}', '${u.email}', '${u.subscription?.plan || 'free'}', ${u.subscription?.maxRules || 5}, ${u.isActive}, '${u.role || 'user'}')"><i class="fas fa-pen"></i></button>
            <button class="btn btn-danger" onclick="deleteUser('${u._id}')"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function openEditModal(id, name, email, plan, maxRules, isActive, role) {
      editingUserId = id;
      document.getElementById('editName').value = name;
      document.getElementById('editEmail').value = email;
      document.getElementById('editPlan').value = plan;
      document.getElementById('editMaxRules').value = maxRules;
      document.getElementById('editStatus').value = String(isActive);
      document.getElementById('editRole').value = role;
      document.getElementById('editModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('editModal').classList.remove('show');
      editingUserId = null;
    }

    async function saveUserEdit() {
      if (!editingUserId) return;
      try {
        // Update user info
        await fetch(`/api/admin/users/${editingUserId}`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({
            name: document.getElementById('editName').value,
            email: document.getElementById('editEmail').value,
            isActive: document.getElementById('editStatus').value === 'true',
            role: document.getElementById('editRole').value
          })
        });

        // Update subscription
        const plan = document.getElementById('editPlan').value;
        const maxRules = parseInt(document.getElementById('editMaxRules').value);
        await fetch(`/api/admin/users/${editingUserId}/subscription`, {
          method: 'PUT',
          headers: authHeaders(),
          body: JSON.stringify({ plan, maxRules, isActive: true })
        });

        showToast('User updated!', 'success');
        closeModal();
        fetchUsers();
        fetchStats();
      } catch (e) {
        showToast('Error updating user', 'error');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Delete this user and ALL their data? This cannot be undone.')) return;
      try {
        await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: authHeaders() });
        showToast('User deleted', 'success');
        fetchUsers();
        fetchStats();
      } catch (e) { showToast('Error', 'error'); }
    }

    function showToast(msg, type) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
