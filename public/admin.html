<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - AutoReply Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .user-card { background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; transition: all 0.2s; }
    .user-card:hover { border-color: var(--primary-light); box-shadow: 0 4px 12px rgba(79,70,229,0.08); }
    .user-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
    .user-left { display: flex; align-items: center; gap: 14px; }
    .user-avatar-lg { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; }
    .user-name { font-weight: 700; font-size: 0.95rem; }
    .user-email { color: var(--gray); font-size: 0.82rem; }
    .user-badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .user-details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .detail-item { font-size: 0.82rem; color: var(--gray); }
    .detail-item strong { display: block; color: var(--dark); font-size: 0.88rem; margin-top: 2px; }
    .user-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .plan-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
    .plan-free { background: #f1f5f9; color: #64748b; }
    .plan-starter { background: #eff6ff; color: #2563eb; }
    .plan-pro { background: #f5f3ff; color: #7c3aed; }
    .plan-enterprise { background: #fef3c7; color: #d97706; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .status-active { background: #ecfdf5; color: #059669; }
    .status-inactive { background: #fef2f2; color: #dc2626; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 550px; max-height: 85vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    .modal h2 i { color: var(--primary); }
    .modal .form-group { margin-bottom: 14px; }
    .modal .form-group label { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; display: block; }
    .modal .form-group input, .modal .form-group select { width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
    .modal .form-group input:focus, .modal .form-group select:focus { border-color: var(--primary); outline: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 200px; padding: 10px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
    .search-bar select { padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
      <span class="brand-text">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="overview"><i class="fas fa-chart-pie"></i><span>Overview</span></a>
      <a href="#" class="nav-item" data-section="users"><i class="fas fa-users"></i><span>All Users</span></a>
      <a href="#" class="nav-item" data-section="coupons"><i class="fas fa-ticket"></i><span>Coupons</span></a>
      <a href="/dashboard" class="nav-item"><i class="fas fa-desktop"></i><span>My Dashboard</span></a>
      <a href="/" class="nav-item"><i class="fas fa-globe"></i><span>View Site</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <div class="topbar-title"><h1 id="pageTitle">Admin Overview</h1></div>
      <div class="topbar-actions"><span class="live-badge" style="background:#fef3c7;color:#d97706;"><i class="fas fa-shield-halved"></i> Admin</span></div>
    </header>

    <main class="content">
      <!-- Overview -->
      <section id="section-overview" class="section active">
        <div class="stats-grid">
          <div class="stat-card stat-blue"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><span class="stat-number" id="statTotalUsers">0</span><span class="stat-label">Total Users</span></div></div>
          <div class="stat-card stat-green"><div class="stat-icon"><i class="fas fa-user-check"></i></div><div class="stat-info"><span class="stat-number" id="statActiveUsers">0</span><span class="stat-label">Active Users</span></div></div>
          <div class="stat-card stat-purple"><div class="stat-icon"><i class="fas fa-list"></i></div><div class="stat-info"><span class="stat-number" id="statTotalRules">0</span><span class="stat-label">Total Rules</span></div></div>
          <div class="stat-card stat-whatsapp"><div class="stat-icon"><i class="fas fa-crown"></i></div><div class="stat-info"><span class="stat-number" id="statPaidUsers">0</span><span class="stat-label">Paid Users</span></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-chart-bar"></i> Plans Breakdown</h2></div>
          <div style="padding:24px;">
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><span>🆓 Free</span><strong id="statFree">0</strong></div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><span>⭐ Starter</span><strong id="statStarter">0</strong></div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);"><span>🔵 Pro</span><strong id="statPro">0</strong></div>
            <div style="display:flex;justify-content:space-between;padding:10px 0;"><span>🟣 Enterprise</span><strong id="statEnterprise">0</strong></div>
          </div>
        </div>
      </section>

      <!-- Users -->
      <section id="section-users" class="section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-users"></i> All Users</h2><button class="btn btn-primary" style="padding:8px 16px;font-size:0.82rem;" onclick="openCreateUser()"><i class="fas fa-user-plus"></i> Add User</button></div>
          <div style="padding:16px 24px;">
            <div class="search-bar">
              <input type="text" id="searchInput" placeholder="Search by name or email..." oninput="filterUsers()">
              <select id="filterPlan" onchange="filterUsers()">
                <option value="all">All Plans</option>
                <option value="free">Free</option>
                <option value="starter">Starter</option>
                <option value="pro">Pro</option>
                <option value="enterprise">Enterprise</option>
              </select>
              <select id="filterStatus" onchange="filterUsers()">
                <option value="all">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Suspended</option>
              </select>
            </div>
            <div id="usersContainer"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
          </div>
        </div>
      </section>

      <!-- Coupons -->
      <section id="section-coupons" class="section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-ticket"></i> Create Coupon</h2></div>
          <div style="padding:24px;">
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
              <div class="form-group"><label>Code</label><input type="text" id="couponCode" placeholder="e.g. SAVE20" style="text-transform:uppercase;"></div>
              <div class="form-group"><label>Discount (%)</label><input type="number" id="couponDiscount" placeholder="e.g. 20" min="1" max="100"></div>
              <div class="form-group"><label>Max Uses</label><input type="number" id="couponMaxUses" value="100"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <div class="form-group"><label>For Plan</label>
                <select id="couponPlan"><option value="all">All Plans</option><option value="starter">Starter</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select>
              </div>
              <div class="form-group"><label>Expires At</label><input type="date" id="couponExpires"></div>
            </div>
            <button class="btn btn-primary" onclick="createCoupon()"><i class="fas fa-plus"></i> Create Coupon</button>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-list"></i> All Coupons</h2></div>
          <div id="couponsContainer" style="padding:16px 24px;"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2><i class="fas fa-user-edit"></i> Manage User</h2>
      <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
      <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Status</label>
          <select id="editStatus"><option value="true">Active</option><option value="false">Suspended</option></select>
        </div>
        <div class="form-group"><label>Role</label>
          <select id="editRole"><option value="user">User</option><option value="admin">Admin</option></select>
        </div>
      </div>

      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
      <h3 style="font-size:0.95rem;margin-bottom:12px;"><i class="fas fa-crown" style="color:#d97706;"></i> Subscription</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Plan</label>
          <select id="editPlan" onchange="updateMaxRules()">
            <option value="free">Free</option>
            <option value="starter">Starter</option>
            <option value="pro">Pro</option>
            <option value="enterprise">Enterprise</option>
          </select>
        </div>
        <div class="form-group"><label>Max Rules</label><input type="number" id="editMaxRules" value="5"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>Start Date</label><input type="date" id="editStartDate"></div>
        <div class="form-group"><label>End Date (Expiry)</label><input type="date" id="editEndDate"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
        <div class="form-group"><label>Amount (BDT)</label><input type="number" id="editAmount" value="0"></div>
        <div class="form-group"><label>Payment Method</label><input type="text" id="editPayment" placeholder="bKash/Nagad"></div>
        <div class="form-group"><label>Transaction ID</label><input type="text" id="editTxnId" placeholder="TXN123"></div>
      </div>
      <div class="form-group"><label>Coupon Used</label><input type="text" id="editCoupon" placeholder="Coupon code if any"></div>

      <hr style="margin:16px 0;border:none;border-top:1px solid var(--border);">
      <h3 style="font-size:0.95rem;margin-bottom:12px;"><i class="fas fa-link" style="color:var(--primary);"></i> Page Details</h3>
      <div class="form-group"><label>Page Name</label><input type="text" id="editPageName"></div>
      <div class="form-group"><label>Page ID</label><input type="text" id="editPageId"></div>
      <div class="form-group"><label>Page Access Token</label><input type="text" id="editPageToken"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>WhatsApp Phone ID</label><input type="text" id="editWaPhone"></div>
        <div class="form-group"><label>WhatsApp Token</label><input type="text" id="editWaToken"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveUser()"><i class="fas fa-save"></i> Save Changes</button>
        <button class="btn" style="background:#e2e8f0;" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';
    function authHeaders() { return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }; }

    let allUsers = [];
    let editingUserId = null;

    document.addEventListener('DOMContentLoaded', () => { fetchStats(); fetchUsers(); fetchCoupons(); setupNav(); });

    function setupNav() {
      document.querySelectorAll('.nav-item[data-section]').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          const s = item.dataset.section;
          document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
          item.classList.add('active');
          document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
          document.getElementById(`section-${s}`).classList.add('active');
          document.getElementById('pageTitle').textContent = s === 'overview' ? 'Admin Overview' : 'All Users';
        });
      });
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.clear(); window.location.href = '/login'; }

    async function fetchStats() {
      const res = await fetch('/api/admin/stats', { headers: authHeaders() });
      const data = await res.json();
      if (data.success) {
        const d = data.data;
        document.getElementById('statTotalUsers').textContent = d.totalUsers;
        document.getElementById('statActiveUsers').textContent = d.activeUsers;
        document.getElementById('statTotalRules').textContent = d.totalRules;
        document.getElementById('statPaidUsers').textContent = d.proUsers + d.enterpriseUsers;
        document.getElementById('statFree').textContent = d.freeUsers;
        document.getElementById('statStarter').textContent = 0;
        document.getElementById('statPro').textContent = d.proUsers;
        document.getElementById('statEnterprise').textContent = d.enterpriseUsers;
      }
    }

    async function fetchUsers() {
      const res = await fetch('/api/admin/users', { headers: authHeaders() });
      const data = await res.json();
      if (data.success) { allUsers = data.data; renderUsers(allUsers); }
      else document.getElementById('usersContainer').innerHTML = '<p style="color:var(--danger);">Admin access required.</p>';
    }

    function filterUsers() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const plan = document.getElementById('filterPlan').value;
      const status = document.getElementById('filterStatus').value;
      let filtered = allUsers;
      if (search) filtered = filtered.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search));
      if (plan !== 'all') filtered = filtered.filter(u => (u.subscription?.plan || 'free') === plan);
      if (status === 'active') filtered = filtered.filter(u => u.isActive);
      if (status === 'inactive') filtered = filtered.filter(u => !u.isActive);
      renderUsers(filtered);
    }

    function renderUsers(users) {
      if (!users.length) { document.getElementById('usersContainer').innerHTML = '<div class="empty-state"><p>No users found.</p></div>'; return; }
      document.getElementById('usersContainer').innerHTML = users.map(u => `
        <div class="user-card">
          <div class="user-top">
            <div class="user-left">
              <div class="user-avatar-lg">${u.name.charAt(0).toUpperCase()}</div>
              <div>
                <div class="user-name">${u.name} ${u.role === 'admin' ? '<i class="fas fa-shield-halved" style="color:#d97706;font-size:0.75rem;"></i>' : ''}</div>
                <div class="user-email">${u.email}</div>
              </div>
            </div>
            <div class="user-badges">
              <span class="plan-badge plan-${u.subscription?.plan || 'free'}">${u.subscription?.plan || 'free'}</span>
              <span class="status-badge ${u.isActive ? 'status-active' : 'status-inactive'}">${u.isActive ? '● Active' : '● Suspended'}</span>
            </div>
          </div>
          <div class="user-details-grid">
            <div class="detail-item">Rules<strong>${u.ruleCount || 0} / ${u.subscription?.maxRules || 5}</strong></div>
            <div class="detail-item">Page<strong>${u.pageDetails?.pageName || '❌ Not connected'}</strong></div>
            <div class="detail-item">Joined<strong>${new Date(u.createdAt).toLocaleDateString()}</strong></div>
            <div class="detail-item">Last Login<strong>${u.lastLogin ? new Date(u.lastLogin).toLocaleDateString() : 'Never'}</strong></div>
          </div>
          <div class="user-actions">
            <button class="btn btn-edit" onclick='openEdit(${JSON.stringify(u).replace(/'/g,"&#39;")})'><i class="fas fa-pen"></i> Edit</button>
            <button class="btn btn-primary" style="padding:8px 14px;font-size:0.8rem;" onclick="upgradeToPro('${u._id}')"><i class="fas fa-crown"></i> Upgrade Pro</button>
            <button class="btn btn-danger" onclick="deleteUser('${u._id}')"><i class="fas fa-trash"></i> Delete</button>
          </div>
        </div>
      `).join('');
    }

    function openEdit(u) {
      editingUserId = u._id;
      document.getElementById('editName').value = u.name || '';
      document.getElementById('editEmail').value = u.email || '';
      document.getElementById('editPlan').value = u.subscription?.plan || 'free';
      document.getElementById('editMaxRules').value = u.subscription?.maxRules || 5;
      document.getElementById('editStatus').value = String(u.isActive);
      document.getElementById('editRole').value = u.role || 'user';
      document.getElementById('editStartDate').value = u.subscription?.startDate ? new Date(u.subscription.startDate).toISOString().split('T')[0] : '';
      document.getElementById('editEndDate').value = u.subscription?.endDate ? new Date(u.subscription.endDate).toISOString().split('T')[0] : '';
      document.getElementById('editAmount').value = u.subscription?.amount || 0;
      document.getElementById('editPayment').value = u.subscription?.paymentMethod || '';
      document.getElementById('editTxnId').value = u.subscription?.transactionId || '';
      document.getElementById('editCoupon').value = u.subscription?.couponUsed || '';
      document.getElementById('editPageName').value = u.pageDetails?.pageName || '';
      document.getElementById('editPageId').value = u.pageDetails?.pageId || '';
      document.getElementById('editPageToken').value = u.pageDetails?.pageAccessToken || '';
      document.getElementById('editWaPhone').value = u.pageDetails?.whatsappPhoneNumberId || '';
      document.getElementById('editWaToken').value = u.pageDetails?.whatsappAccessToken || '';
      document.getElementById('editModal').classList.add('show');
    }

    function closeModal() { document.getElementById('editModal').classList.remove('show'); }

    function updateMaxRules() {
      const plan = document.getElementById('editPlan').value;
      const limits = { free: 5, starter: 25, pro: 100, enterprise: 99999 };
      document.getElementById('editMaxRules').value = limits[plan] || 5;
    }

    async function saveUser() {
      if (!editingUserId) return;
      try {
        await fetch(`/api/admin/users/${editingUserId}`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({
            name: document.getElementById('editName').value,
            email: document.getElementById('editEmail').value,
            isActive: document.getElementById('editStatus').value === 'true',
            role: document.getElementById('editRole').value
          })
        });
        await fetch(`/api/admin/users/${editingUserId}/subscription`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({
            plan: document.getElementById('editPlan').value,
            maxRules: parseInt(document.getElementById('editMaxRules').value),
            isActive: true,
            startDate: document.getElementById('editStartDate').value || null,
            endDate: document.getElementById('editEndDate').value || null,
            amount: parseInt(document.getElementById('editAmount').value) || 0,
            paymentMethod: document.getElementById('editPayment').value,
            transactionId: document.getElementById('editTxnId').value,
            couponUsed: document.getElementById('editCoupon').value
          })
        });
        await fetch(`/api/admin/users/${editingUserId}/page`, {
          method: 'PUT', headers: authHeaders(),
          body: JSON.stringify({
            pageName: document.getElementById('editPageName').value,
            pageId: document.getElementById('editPageId').value,
            pageAccessToken: document.getElementById('editPageToken').value,
            whatsappPhoneNumberId: document.getElementById('editWaPhone').value,
            whatsappAccessToken: document.getElementById('editWaToken').value
          })
        });
        showToast('User updated!', 'success');
        closeModal(); fetchUsers(); fetchStats();
      } catch (e) { showToast('Error saving', 'error'); }
    }

    async function upgradeToPro(id) {
      if (!confirm('Upgrade this user to Pro plan (100 rules)?')) return;
      await fetch(`/api/admin/users/${id}/subscription`, {
        method: 'PUT', headers: authHeaders(),
        body: JSON.stringify({ plan: 'pro', maxRules: 100, isActive: true })
      });
      showToast('Upgraded to Pro!', 'success');
      fetchUsers(); fetchStats();
    }

    async function deleteUser(id) {
      if (!confirm('DELETE this user and ALL their data? Cannot undo!')) return;
      await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: authHeaders() });
      showToast('User deleted', 'success');
      fetchUsers(); fetchStats();
    }

    function showToast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i> ${msg}`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ============ COUPONS ============
    async function fetchCoupons() {
      try {
        const res = await fetch('/api/admin/coupons', { headers: authHeaders() });
        const data = await res.json();
        if (data.success) renderCoupons(data.data);
      } catch (e) {}
    }

    function renderCoupons(coupons) {
      const container = document.getElementById('couponsContainer');
      if (!coupons.length) { container.innerHTML = '<p style="color:var(--gray);padding:20px;">No coupons yet.</p>'; return; }
      container.innerHTML = coupons.map(c => `
        <div class="user-card" style="padding:14px;">
          <div style="flex:1;">
            <strong style="font-size:1.1rem;color:var(--primary);">${c.code}</strong>
            <span class="plan-badge plan-${c.plan}" style="margin-left:8px;">${c.plan}</span>
            <span style="margin-left:8px;color:var(--success);font-weight:700;">${c.discount}% OFF</span>
            <div style="font-size:0.8rem;color:var(--gray);margin-top:4px;">
              Used: ${c.usedCount}/${c.maxUses} | 
              ${c.expiresAt ? 'Expires: ' + new Date(c.expiresAt).toLocaleDateString() : 'No expiry'} |
              ${c.isActive ? '🟢 Active' : '🔴 Inactive'}
            </div>
          </div>
          <button class="btn btn-danger" onclick="deleteCoupon('${c._id}')"><i class="fas fa-trash"></i></button>
        </div>
      `).join('');
    }

    async function createCoupon() {
      const code = document.getElementById('couponCode').value.trim();
      const discount = parseInt(document.getElementById('couponDiscount').value);
      const maxUses = parseInt(document.getElementById('couponMaxUses').value) || 100;
      const plan = document.getElementById('couponPlan').value;
      const expiresAt = document.getElementById('couponExpires').value || null;

      if (!code || !discount) { showToast('Code and discount required', 'error'); return; }

      try {
        const res = await fetch('/api/admin/coupons', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ code, discount, maxUses, plan, expiresAt })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Coupon created!', 'success');
          document.getElementById('couponCode').value = '';
          document.getElementById('couponDiscount').value = '';
          fetchCoupons();
        } else { showToast(data.message, 'error'); }
      } catch (e) { showToast('Error creating coupon', 'error'); }
    }

    async function deleteCoupon(id) {
      if (!confirm('Delete this coupon?')) return;
      await fetch(`/api/admin/coupons/${id}`, { method: 'DELETE', headers: authHeaders() });
      showToast('Coupon deleted', 'success');
      fetchCoupons();
    }

    // ============ CREATE USER ============
    function openCreateUser() {
      const html = prompt('Enter details (format: name,email,password,plan)\nExample: John,john@email.com,pass123,pro');
      if (!html) return;
      const parts = html.split(',');
      if (parts.length < 3) { showToast('Format: name,email,password,plan', 'error'); return; }
      createNewUser(parts[0].trim(), parts[1].trim(), parts[2].trim(), parts[3]?.trim() || 'free');
    }

    async function createNewUser(name, email, password, plan) {
      try {
        const res = await fetch('/api/admin/users', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ name, email, password, plan })
        });
        const data = await res.json();
        if (data.success) {
          showToast('User created!', 'success');
          fetchUsers(); fetchStats();
        } else { showToast(data.message, 'error'); }
      } catch (e) { showToast('Error creating user', 'error'); }
    }
  </script>
</body>
</html>
