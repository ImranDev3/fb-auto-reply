<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoReply Pro - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-brand .icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #4f46e5, #818cf8);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      margin-bottom: 12px;
    }

    .auth-brand h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 800;
    }

    .auth-brand p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin-top: 5px;
    }

    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 28px;
      border-bottom: 2px solid #e2e8f0;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #334155;
      font-size: 0.9rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .input-wrapper input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4f46e5, #3730a3);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .btn-auth:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }

    .btn-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show {
      display: flex;
    }

    .success-msg {
      background: #ecfdf5;
      color: #059669;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .success-msg.show {
      display: flex;
    }

    .features {
      margin-top: 30px;
      text-align: center;
    }

    .features p {
      color: #64748b;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .feature-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .feature-tag {
      padding: 5px 12px;
      background: #f1f5f9;
      border-radius: 20px;
      font-size: 0.78rem;
      color: #475569;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="icon"><i class="fas fa-robot"></i></div>
      <h1>AutoReply Pro</h1>
      <p>Smart Messenger & WhatsApp Auto Reply Bot</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" onclick="switchTab('register')">Sign Up</div>
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <div class="success-msg" id="successMsg">
        <i class="fas fa-check-circle"></i>
        <span id="successText"></span>
      </div>

      <!-- Login Form -->
      <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
          </div>
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="regName" placeholder="Your name" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="regEmail" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label>Password (min 6 characters)</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="regPassword" placeholder="Create password" minlength="6" required>
          </div>
        </div>
        <button type="submit" class="btn-auth" id="regBtn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="features">
        <p>What you get:</p>
        <div class="feature-tags">
          <span class="feature-tag">🤖 Auto Reply Bot</span>
          <span class="feature-tag">💬 Messenger</span>
          <span class="feature-tag">📱 WhatsApp</span>
          <span class="feature-tag">🌙 24/7 Away Mode</span>
          <span class="feature-tag">📊 Dashboard</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }

      hideMessages();
    }

    function showError(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
      document.getElementById('successText').textContent = msg;
      document.getElementById('successMsg').classList.add('show');
      document.getElementById('errorMsg').classList.remove('show');
    }

    function hideMessages() {
      document.getElementById('errorMsg').classList.remove('show');
      document.getElementById('successMsg').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
          window.location.href = '/dashboard';
        } else {
          showError(data.message);
        }
      } catch (error) {
        showError('Server error. Please try again.');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }

    async function handleRegister(e) {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const btn = document.getElementById('regBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data));
          window.location.href = '/dashboard';
        } else {
          showError(data.message);
        }
      } catch (error) {
        showError('Server error. Please try again.');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  </script>
</body>
</html>
