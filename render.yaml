# Render.com deployment configuration
# This file tells Render how to deploy your app

services:
  - type: web
    name: fb-auto-reply-saas
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FB_VERIFY_TOKEN
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
